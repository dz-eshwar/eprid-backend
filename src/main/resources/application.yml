spring:
  application:
    name: eprid

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eprid}
    username: ${DB_USERNAME:eprid}
    password: ${DB_PASSWORD:eprid}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: eprid
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: eprid
    default-schema: eprid
    baseline-on-migrate: true
    baseline-version: 0

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

server:
  port: ${PORT:${SERVER_PORT:8080}}
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.rorapps.eprid: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    secret: ${JWT_SECRET:eprid-dev-secret-change-in-production-must-be-at-least-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  storage:
    base-path: ${STORAGE_PATH:./uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}
  aws:
    region: ${AWS_REGION:ap-south-1}
    s3-bucket: ${S3_VAULT_BUCKET:eprid-vault-dev}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
